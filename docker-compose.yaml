services:
  todo:
    build:
      context: ${PROJECT_DIR}
      dockerfile: ${PROJECT_DIR}/cmd/todo/Dockerfile
    container_name: todo
    environment:
      - HTTP_ADDR=:5050
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT}
      - POSTGRES_HOST=todo-postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - TIME_ZONE=${TIME_ZONE}
      - LOGGER_FOLDER=/app/out/logs
    volumes:
      - ${PROJECT_DIR}/out/logs:/app/out/logs
    ports:
      - "5050:5050"
    restart: always

  todo-postgres:
    image: postgres:18.3-bookworm
    container_name: todo-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_DIR}/out/pgdata:/var/lib/postgresql
    restart: always

  todo-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_DIR}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todo-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todo-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"